<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Port Jackson Reef Run</title>
  </head>
  <body>
    <div id="app">
      <div id="game-root"></div>
      <div id="splash" aria-hidden="true">
        <img src="%BASE_URL%assets/creatures/muuc.svg" alt="" />
      </div>
      <div id="hud">
        <img id="hud-logo" src="%BASE_URL%assets/creatures/muuc.svg" alt="" />
        <div class="hud-panel">
          <strong id="zone-label">Water Surface</strong>
        </div>
        <div id="depth-gauge" aria-label="Depth gauge">
          <div id="depth-gauge-track">
            <div id="depth-gauge-fill"></div>
            <div class="depth-gauge-tick top"></div>
            <div class="depth-gauge-tick mid"></div>
            <div class="depth-gauge-tick bottom"></div>
            <div id="depth-marker">
              <span id="depth-label">0m</span>
            </div>
          </div>
          <span id="depth-gauge-max">500m</span>
        </div>
      </div>
      <div id="dev-tools" aria-label="Developer world navigation">
        <button id="dev-toggle" type="button" aria-pressed="false" title="Developer camera">DEV</button>
        <div class="dev-extra">
          <button id="dev-zoom-out" type="button" title="Zoom out">-</button>
          <button id="dev-zoom-in" type="button" title="Zoom in">+</button>
          <button id="dev-fit" type="button" title="Fit world">[]</button>
          <button id="dev-player" type="button" title="Follow player">@</button>
          <label class="dev-slider" title="World X">
            <span>X</span>
            <input id="dev-x-range" type="range" min="0" max="50000" value="0" />
          </label>
          <label class="dev-slider" title="World Y">
            <span>Y</span>
            <input id="dev-y-range" type="range" min="0" max="17024" value="0" />
          </label>
          <label class="dev-seed" title="Cave seed">
            <span>Seed</span>
            <input id="cave-seed-input" type="number" min="0" step="1" value="130626" />
          </label>
          <button id="cave-seed-apply" type="button" title="Apply cave seed">Apply</button>
          <button id="cave-seed-random" type="button" title="New cave seed">New</button>
          <output id="dev-camera-readout">x 0 y 0 z 1.00</output>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
